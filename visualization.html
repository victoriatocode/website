<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualization — Eunhee Victoria Park</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/shell.css" />
  <style>
    .page-body {
      max-width: none;
      width: 100%;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      margin-top: 1rem;
      width: 100%;
    }

    .year-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 1.2rem;
      align-items: start;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--rule);
    }

    .year-row:last-child {
      border-bottom: none;
    }

    .year-label {
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: var(--mid);
      padding-top: 0.15rem;
    }

    .year-pages {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 1.5rem;
      width: 100%;
    }

    .page-tile {
      display: block;
      width: 36px;
      aspect-ratio: 1 / 1.3;
      border: 1px solid var(--rule, #d8d4ce);
      background: #fff;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, z-index 0s;
      position: relative;
    }

    .page-tile:hover {
      transform: scale(2.4);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      z-index: 5;
    }

    .page-tile img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .group-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      margin: 0 0 0.35rem;
    }

    .group {
      display: flex;
      flex-direction: column;
      flex: 0 1 auto;
      min-width: 0;
    }

    .group-tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .legend {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: var(--mid);
      margin-bottom: 1rem;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 4rem 2rem 2rem;
    }

    .lightbox.open { display: flex; }

    .lightbox-img-wrap {
      position: relative;
      max-width: min(900px, 95vw);
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      display: block;
      max-width: 100%;
      max-height: 90vh;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .lightbox button {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      border: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    .lightbox button:hover { background: #fff; }

    .lightbox-close { top: -3rem; right: 0; }
    .lightbox-prev { left: -4rem; top: 50%; transform: translateY(-50%); }
    .lightbox-next { right: -4rem; top: 50%; transform: translateY(-50%); }

    .lightbox-counter {
      position: absolute;
      top: -3rem;
      left: 0;
      color: #fff;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 44px;
    }

    @media (max-width: 900px) {
      .lightbox-prev { left: 0.5rem; }
      .lightbox-next { right: 0.5rem; }
      .lightbox-close { top: 0.5rem; right: 0.5rem; }
      .lightbox-counter { top: 0.5rem; left: 1rem; line-height: 1; }
    }
  </style>
  <link rel="icon" href="parklogo.png" type="image/png">
</head>

<body>
  <main class="content">
    <div class="sec-masthead">
      <h1 class="sec-masthead-title">Visualization</h1>
      <span class="sec-masthead-num">Pages Over Time</span>
    </div>
    <div class="page-body">
      <p>Every page of papers, ordered by year. Hover to enlarge; click to open at full size.</p>

      <div class="timeline" id="timeline"></div>
    </div>
  </main>

  <div class="lightbox" id="viz-lightbox" role="dialog" aria-modal="true" aria-label="Page viewer">
    <div class="lightbox-img-wrap">
      <span class="lightbox-counter" id="lightbox-counter"></span>
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
      <button type="button" class="lightbox-prev" id="lightbox-prev" aria-label="Previous page">&#8592;</button>
      <button type="button" class="lightbox-next" id="lightbox-next" aria-label="Next page">&#8594;</button>
      <img class="lightbox-img" id="lightbox-img" alt="" />
    </div>
  </div>

  <script>
    const TIMELINE = [
      {
        year: 2025,
        groups: [
          { label: 'DJ Study Protocol (BMC)',        prefix: 'reports/protocol-page-',           count: 12, pad: 2 },
          { label: 'Navigating Silence (BMC)',       prefix: 'reports/navigating-silence-page-', count: 14, pad: 2 },
          { label: 'Yellow Power (AJPH)',            prefix: 'reports/perspective-page-',        count: 2,  pad: 1 },
          { label: 'SV & Alcohol Perception (JACH)', prefix: 'reports/sv-alcohol-page-',         count: 13, pad: 2 },
        ],
      },
      {
        year: 2024,
        groups: [
          { label: 'They Don’t See Us (J Int Violence)', prefix: 'reports/they-dont-see-us-page-', count: 32, pad: 2 },
          { label: 'DJ Study Policy Brief',                    prefix: 'reports/policy-brief-page-',     count: 22, pad: 2 },
          { label: 'Survivors+Allies Summary',                 prefix: 'reports/sa-summary-page-',       count: 2,  pad: 1 },
        ],
      },
      {
        year: 2022,
        groups: [
          { label: 'UC Speaks Up Protocol (JMIR)',   prefix: 'reports/ucsu-protocol-page-',   count: 16, pad: 2 },
          { label: 'NCAA Athletes (J Int Violence)', prefix: 'reports/ncaa-athletes-page-',   count: 29, pad: 2 },
          { label: 'Perinatal Preferences (BMC PC)', prefix: 'reports/perinatal-prefs-page-', count: 18, pad: 2 },
          { label: 'CS California (BMC ID)',         prefix: 'reports/cs-california-page-',   count: 14, pad: 2 },
          { label: 'Opening the Black Box (VAW)',    prefix: 'reports/black-box-page-',       count: 34, pad: 2 },
          { label: 'Examining Masculinities (GHSP)', prefix: 'reports/masculinities-page-',   count: 12, pad: 2 },
          { label: 'DJ Study Concept Paper',         prefix: 'reports/concept-paper-page-',   count: 10, pad: 2 },
        ],
      },
      {
        year: 2021,
        groups: [
          { label: 'Kern County Prenatal Care (PLoS ONE)', prefix: 'reports/kern-county-page-', count: 12, pad: 2 },
        ],
      },
      {
        year: 2020,
        groups: [
          { label: 'Alcohol Use, Rakai (PLoS ONE)', prefix: 'reports/rakai-alcohol-page-', count: 18, pad: 2 },
        ],
      },
      {
        year: 2019,
        groups: [
          { label: 'SV Research #MeToo (sec.)', prefix: 'reports/sv-review-page-', start: 63, count: 8, pad: 3 },
        ],
      },
      {
        year: 2018,
        groups: [
          { label: 'Jacmel, Haiti Case Study', prefix: 'reports/haiti-page-',          count: 28, pad: 2 },
          { label: 'Tanzania Case Study',      prefix: 'reports/tanzania-page-',       count: 28, pad: 2 },
          { label: 'SASA! Summary Brief',      prefix: 'reports/sasa-summary-page-',   count: 12, pad: 2 },
        ],
      },
      {
        year: 2016,
        groups: [
          { label: 'Behavior Change Priorities', prefix: 'reports/behavior-change-page-', count: 8, pad: 1 },
        ],
      },
      {
        year: 2015,
        groups: [
          { label: 'Korea Health Aid Governance', prefix: 'reports/korea-aid-page-', count: 6, pad: 1 },
        ],
      },
    ];

    function pad(n, width) { return String(n).padStart(width, '0'); }

    const overlay = document.getElementById('viz-lightbox');
    const imgEl = document.getElementById('lightbox-img');
    const counter = document.getElementById('lightbox-counter');
    const closeBtn = document.getElementById('lightbox-close');
    const prevBtn = document.getElementById('lightbox-prev');
    const nextBtn = document.getElementById('lightbox-next');

    let allItems = [];
    let activeRange = null;
    let idx = 0;

    function show(i) {
      const len = activeRange.length;
      idx = (i + len) % len;
      const item = activeRange[idx];
      imgEl.src = item.src;
      imgEl.alt = item.alt;
      counter.textContent = (idx + 1) + ' / ' + len + ' · ' + item.label;
    }

    function open(range, startIdx) {
      activeRange = range;
      show(startIdx);
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', close);
    prevBtn.addEventListener('click', () => show(idx - 1));
    nextBtn.addEventListener('click', () => show(idx + 1));
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', e => {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowLeft') show(idx - 1);
      else if (e.key === 'ArrowRight') show(idx + 1);
    });

    const timelineEl = document.getElementById('timeline');

    TIMELINE.forEach(yearBlock => {
      const row = document.createElement('div');
      row.className = 'year-row';

      const yearLabel = document.createElement('div');
      yearLabel.className = 'year-label';
      yearLabel.textContent = yearBlock.year;
      row.appendChild(yearLabel);

      const pages = document.createElement('div');
      pages.className = 'year-pages';

      yearBlock.groups.forEach(g => {
        const groupItems = [];
        const start = g.start || 1;
        for (let i = 0; i < g.count; i++) {
          const pageNo = start + i;
          groupItems.push({
            src: g.prefix + pad(pageNo, g.pad) + '.png',
            label: g.label + ' · p.' + pageNo,
            alt: g.label + ' page ' + pageNo,
          });
        }

        const groupEl = document.createElement('div');
        groupEl.className = 'group';

        const lbl = document.createElement('div');
        lbl.className = 'group-label';
        lbl.textContent = g.label;
        groupEl.appendChild(lbl);

        const tiles = document.createElement('div');
        tiles.className = 'group-tiles';
        groupItems.forEach((item, i) => {
          const tile = document.createElement('button');
          tile.type = 'button';
          tile.className = 'page-tile';
          tile.setAttribute('aria-label', 'Open ' + item.label);
          const im = document.createElement('img');
          im.src = item.src;
          im.alt = item.alt;
          im.loading = 'lazy';
          tile.appendChild(im);
          tile.addEventListener('click', () => open(groupItems, i));
          tiles.appendChild(tile);
        });
        groupEl.appendChild(tiles);
        pages.appendChild(groupEl);
      });

      row.appendChild(pages);
      timelineEl.appendChild(row);
    });
  </script>
</body>

</html>
