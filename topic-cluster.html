<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic Cluster — Eunhee Victoria Park</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/shell.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    .page-body {
      max-width: none;
      width: 100%;
    }

    svg#cluster {
      width: 100%;
      height: 820px;
      border: 1px solid var(--rule);
      background: white;
      cursor: grab;
    }

    svg#cluster:active { cursor: grabbing; }

    .cluster-hint {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin: 0.6rem 0 0;
    }
  </style>
  <link rel="icon" href="parklogo.png" type="image/png">
</head>

<body>
  <main class="content">
    <div class="sec-masthead">
      <h1 class="sec-masthead-title">Topic Cluster</h1>
      <span class="sec-masthead-num">Publications by Research Area</span>
    </div>
    <div class="page-body">
      <p>Drag to rearrange · scroll to zoom · click a paper to open its PDF.</p>

      <svg id="cluster"></svg>
      <p class="cluster-hint">Hover any node to see its full title and year.</p>
    </div>
  </main>

  <script>
    const PDF_BASE = 'publications/';

    const PAPERS = [
      {"id":18,"year":2025,"title":"Barriers to Prenatal Care in the Context of Maternal Methamphetamine Use and Congenital Syphilis in Los Angeles County, 2011-2020","journal":"Doctoral Dissertation, UCLA","pdf":"Barriers to Prenatal Care Amid Maternal Methamphetamine Use and Congenital Syphilis Epidemic in Los Angeles County .pdf","themes":["Maternal & Reproductive Health","HIV/STIs","Substance Use & Policy","Structural Determinants"]},
      {"id":16,"year":2025,"title":"Double jeopardy study protocol: ANHPI college students at the intersection of sexual violence and anti-Asian racism","journal":"BMC Public Health","pdf":"Double Jeopardy Study Protocol.pdf","themes":["Gender-Based Violence","Sexual & Reproductive Health","Structural Determinants"]},
      {"id":15,"year":2025,"title":"Navigating Silence: Cultural, Familial, and Immigration Influences on the SV Experiences of Asian Female College Students","journal":"BMC Public Health","pdf":"Navigating Silence.pdf","themes":["Gender-Based Violence","Sexual & Reproductive Health","Structural Determinants"]},
      {"id":14,"year":2025,"title":"Yellow Power: Building Asian Student Community Voices Against GBV through Public Health Research and Art","journal":"Am J Public Health","pdf":"Yellow Power Building Asian Student Community Voices Against GBV.pdf","themes":["Gender-Based Violence","Structural Determinants"]},
      {"id":13,"year":2025,"title":"Students' Perceptions of the Relationship between Sexual Violence and Alcohol Use","journal":"J Am College Health","pdf":"Students Perceptions of the Relationship Between Sexual Violence and Alcohol Use.pdf","themes":["Gender-Based Violence","Substance Use & Policy","Sexual & Reproductive Health"]},
      {"id":12,"year":2024,"title":"\"They Don't See Us\": Asian Students' Perceptions of Sexual Violence on Three California Public University Campuses","journal":"J Interpersonal Violence","pdf":"They Don't See Us.pdf","themes":["Gender-Based Violence","Sexual & Reproductive Health","Structural Determinants"]},
      {"id":17,"year":2022,"title":"Student-Athletes', Coaches', and Administrators' Perspectives of SV Prevention on NCAA Campuses","journal":"J Interpersonal Violence","pdf":"Student-Athletes', Coaches', and Administrators' Perspectives of Sexual Violence Prevention on NCAA Campuses.pdf","themes":["Gender-Based Violence","Sexual & Reproductive Health"]},
      {"id":11,"year":2022,"title":"Understanding Perinatal Patient Preferences and Patient-Provider Relationships to Prevent Congenital Syphilis","journal":"BMC Pregnancy Childbirth","pdf":"Understanding Perinatal Patients' Health Preferences and Patient-Provider Relationships to Prevent Congenital Syphilis in California and Louisiana.pdf","themes":["Maternal & Reproductive Health","HIV/STIs","Structural Determinants"]},
      {"id":10,"year":2022,"title":"Qualitative Assessment on the Rise of Congenital Syphilis in California","journal":"BMC Infectious Diseases","pdf":"Qualitative Assessment on the Rise of Congenital Syphilis in California.pdf","themes":["Maternal & Reproductive Health","HIV/STIs","Structural Determinants"]},
      {"id":9,"year":2022,"title":"Examining Masculinities to Inform Gender-Transformative Violence Prevention Programs (Rakai, Uganda)","journal":"Global Health: Sci & Practice","pdf":"Examining Masculinities to Inform Gender-Transformative Violence Prevention Programs.pdf","themes":["Gender-Based Violence","Structural Determinants"]},
      {"id":8,"year":2022,"title":"Opening the \"Black Box\": Student-Generated Solutions to Improve Sexual Violence Response","journal":"Violence Against Women","pdf":"Opening the \"Black Box\".pdf","themes":["Gender-Based Violence","Sexual & Reproductive Health","Structural Determinants"]},
      {"id":7,"year":2022,"title":"Perspectives on IPV and SV on 3 Public University Campuses: Protocol for the UC Speaks Up Study","journal":"JMIR Research Protocols","pdf":"Student, Staff, and Faculty Perspectives on IPVSV on 3 Public University Campuses.pdf","themes":["Gender-Based Violence","Sexual & Reproductive Health"]},
      {"id":5,"year":2021,"title":"Structural Barriers to Prenatal Care and Congenital Syphilis Prevention in Kern County, CA","journal":"PLoS One","pdf":"Structural Barriers to Prenatal Care & Congenital Syphilis Prevention in Kern County, California.pdf","themes":["Maternal & Reproductive Health","HIV/STIs","Substance Use & Policy","Structural Determinants"]},
      {"id":6,"year":2020,"title":"Prevalence and correlates of alcohol use in Rakai, Uganda","journal":"PLoS One","pdf":"Prevalence and Correlates of Men's and Women's Alcohol Use in Agrarian, Trading and Fishing Communities in Rakai.pdf","themes":["Substance Use & Policy","Structural Determinants"]},
      {"id":3,"year":2020,"title":"Structural Barriers to Women's Sustained Engagement in HIV Care in Southern California","journal":"AIDS and Behavior","pdf":null,"themes":["HIV/STIs","Gender-Based Violence","Structural Determinants"]},
      {"id":2,"year":2016,"title":"Prioritizing multiple health behavior change research topics","journal":"Translational Behavioral Medicine","pdf":"Prioritizing Multiple Health Behavior Change Research Topics.pdf","themes":["Structural Determinants"]},
      {"id":1,"year":2015,"title":"Republic of Korea's Health Aid Governance: Perspectives from Partner Countries","journal":"J Korean Medical Science","pdf":"Republic of Korea's Health Aid Governance.pdf","themes":["Structural Determinants"]}
    ];

    buildClusters();
    window.addEventListener('resize', () => buildClusters());

    function buildClusters() {
      const svgEl = document.getElementById('cluster');
      const svg = d3.select('#cluster');
      svg.selectAll('*').remove();
      const W = svgEl.parentElement.clientWidth;
      const H = 820;
      svg.attr('viewBox', `0 0 ${W} ${H}`);

      const themeMap = {};
      PAPERS.forEach((p, i) => {
        (p.themes || []).forEach(t => {
          if (!themeMap[t]) themeMap[t] = { id: 't_' + t, label: t, papers: [] };
          themeMap[t].papers.push(i);
        });
      });

      const colorScale = d3.scaleOrdinal()
        .domain(['Gender-Based Violence', 'Sexual & Reproductive Health', 'Maternal & Reproductive Health', 'HIV/STIs', 'Substance Use & Policy', 'Structural Determinants'])
        .range(['#d62728', '#ff7f0e', '#2ca02c', '#1f77b4', '#9467bd', '#17becf']);

      const nodes = [];
      const links = [];
      PAPERS.forEach((p, i) => nodes.push({
        id: 'p_' + i, paperIdx: i, label: p.title || 'Paper ' + (i + 1),
        type: 'paper', year: p.year, pdf: p.pdf
      }));
      Object.values(themeMap).forEach(th => {
        nodes.push({ id: th.id, label: th.label, type: 'theme' });
        th.papers.forEach(pi => links.push({ source: 'p_' + pi, target: th.id }));
      });

      const PAPER_R = 62;
      const THEME_R = 56;

      const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(140))
        .force('charge', d3.forceManyBody().strength(-450))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collide', d3.forceCollide(d => (d.type === 'theme' ? THEME_R : PAPER_R) + 4).strength(0.95));

      function wrapTextLines(text, maxChars) {
        const words = text.split(/\s+/);
        const lines = [];
        let cur = '';
        for (const w of words) {
          if (!cur) { cur = w; continue; }
          if ((cur + ' ' + w).length <= maxChars) cur += ' ' + w;
          else { lines.push(cur); cur = w; }
        }
        if (cur) lines.push(cur);
        return lines;
      }

      function appendWrapped(parent, text, opts) {
        const { maxChars = 14, lineHeight = 11, fontSize = 9, color = '#3d4f5c', maxLines = 8 } = opts;
        let lines = wrapTextLines(text, maxChars);
        if (lines.length > maxLines) {
          lines = lines.slice(0, maxLines);
          lines[maxLines - 1] = lines[maxLines - 1].replace(/\s*\S*$/, '') + '…';
        }
        const t = parent.append('text')
          .attr('text-anchor', 'middle')
          .attr('font-family', "'IBM Plex Sans', sans-serif")
          .attr('font-size', fontSize)
          .attr('font-weight', 500)
          .attr('fill', color);
        const startDy = -((lines.length - 1) / 2) * lineHeight;
        lines.forEach((ln, i) => {
          t.append('tspan').attr('x', 0).attr('dy', i === 0 ? startDy : lineHeight).text(ln);
        });
      }

      const g = svg.append('g');
      svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform)));

      const link = g.append('g').selectAll('line').data(links).join('line')
        .attr('stroke', '#e0d5c0').attr('stroke-width', 1.5).attr('stroke-opacity', 0.7);

      const node = g.append('g').selectAll('g').data(nodes).join('g').attr('cursor', 'pointer')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

      node.each(function (d) {
        const el = d3.select(this);
        if (d.type === 'theme') {
          el.append('circle').attr('r', THEME_R).attr('fill', colorScale(d.label)).attr('fill-opacity', 0.12)
            .attr('stroke', colorScale(d.label)).attr('stroke-width', 2);
          appendWrapped(el, d.label, { maxChars: 14, lineHeight: 14, fontSize: 12, color: colorScale(d.label) });
        } else {
          el.append('circle').attr('r', PAPER_R).attr('fill', 'white').attr('stroke', '#c8b89a').attr('stroke-width', 1);
          appendWrapped(el, d.label, { maxChars: 16, lineHeight: 11, fontSize: 9, color: '#3d4f5c', maxLines: 9 });
        }
        el.append('title').text(d.label + (d.year ? ' (' + d.year + ')' : ''));
        if (d.type === 'paper' && d.pdf) {
          el.on('click', () => window.open(PDF_BASE + d.pdf, '_blank'));
        }
      });

      sim.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }
  </script>
</body>

</html>
